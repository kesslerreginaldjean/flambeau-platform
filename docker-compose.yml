version: '3.8'

# Local dev stack. NEVER commit real credentials here.
# All secrets are sourced from the .env file (which is .gitignored).
services:
  postgres:
    image: postgres:15-alpine
    container_name: flambeau-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flambeau_db}
      POSTGRES_USER: ${POSTGRES_USER:-flambeau_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flambeau-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: flambeau-pgadmin
    profiles: ["tools"]   # opt-in: `docker compose --profile tools up`
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:?PGADMIN_EMAIL is required in .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD is required in .env}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - flambeau-network

volumes:
  postgres_data:

networks:
  flambeau-network:
    driver: bridge
